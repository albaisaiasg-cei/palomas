<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- HTML Meta Tags -->
    <title>Pururús - Learn about pigeons from the world</title>
    <meta name="description" content="An interactive monopedia about wild pigeons from all around the globe">

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://albaisaiasg-cei.github.io/palomas/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Pururús - Learn about pigeons from the world">
    <meta property="og:description" content="An interactive monopedia about wild pigeons from all around the globe">
    <meta property="og:image" content="assets/og_image.webp">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="albaisaiasg-cei.github.io">
    <meta property="twitter:url" content="https://albaisaiasg-cei.github.io/palomas/">
    <meta name="twitter:title" content="Pururús - Learn about pigeons from the world">
    <meta name="twitter:description" content="An interactive monopedia about wild pigeons from all around the globe">
    <meta name="twitter:image" content="assets/og_image.webp">

    <!-- Meta Tags Generated via https://www.opengraph.xyz -->

    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon-blk.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon-lt.svg" media="(prefers-color-scheme: dark)">

<!-- Connect CSS & JS files to HTML -->
    <link rel="stylesheet" href="css/index.css">
    <!-- Cargar loader.css de forma asíncrona (no bloquea renderizado) -->
    <link rel="preload" as="style" href="css/loader.css" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/loader.css"></noscript>

    <script fetchpriority="high" src="js/loader.js"></script>
    <!-- Type="module" used so import of local JSON file works -->
    <script type="module" src="js/index.js"></script>

<!-- Preload critical images -->
<link rel="preload" as="image" href="assets/backgrounds/textured-vintage.webp" fetchpriority="high">


<body class="homepage">
    <header class="header container--flex-columns with-shadow">
        <h1 class="header__title text-sm">Pururús</h1>
    </header>

    <!-- Loading animation container -->
    <div class="loader-container" id="stage">
        <div class="walking-container"></div>
    </div>
<main>
    <!-- When describing sections with dynamically generated content, a general structure of each block is defined, class names and interpolation placeholders may vary from final template literals in JS file -->
    <!-- Stamps section: Grid of thumbnail images styled as postal stamps-->
    <section class="stamps" id="stamps">
        <div class="stamps__instructions with-shadow container--flex-columns" role="tooltip" aria-label="instructions" tabindex="0">
            <ul class="stamps__instructions-list with-shadow">
                <li><span class="icon__drag"></span><p class="text-xxs">Drag or scroll to move around</p></li>
                <li><p class="text-xxs">Click on any stamp to view its details</p></li>
            </ul>
            <span class="icon__info"></span>
        </div>
        
        <div class="container--grid stamps__grid" id="stampsGrid">
            <!-- Each stamp is created dynamically by JS, information is taken from the "pigeons-with-summaries.json" file.
            
            HTML will have the following structure:
            <button>
                <picture class="stamps__picture">
                    <source src="${webpFile}" type="image/webp">
                    <img 
                        class="stamps__img" 
                        src="${pngFile}"
                        loading="lazy"
                        title="${pigeon.genus} ${pigeon.species}"
                        alt="${pigeon.commonName} styled as a vintage postal stamp"
                    >
                </picture>
            </button>
            -->
        </div>
    </section>

    <!-- Detail section: Popup section with detail view styled as field clipboard for each pigeon species. Each container stays the same, content is modified by JS each time a stamp is clicked on. Styled as a lightbox. -->
    <section class="detail" id="detail">
        <div class="detail__overlay" id="detailOverlay"></div>

        <!-- Detail content block: This contains all the information blocks -->
        <div class="container detail__content" id="detailContent">

            <picture class="detail__clip-picture">
                <source srcset="assets/decorative_img/clip.webp" type="image/webp">
                <img class="detail__clip-img" src="assets/decorative_img/clip.png" alt="decorative clipboard clip">
            </picture>

            <!-- Clipboard block: Background texture & closing control container. -->
            <div class="detail__clipboard container--flex-columns">
                <!-- Closing button: onclick="closeDetail()" was tested for use, but it won't work because the JS import is type="module". The event listener is added in the JS file. -->
                <button type="button" class="detail__close-button" id="detailCloseButton" aria-label="Close detail view">
                    <!-- Alt text is not included on purpose. Since it´s decoration for the button, we want screen readers to ignore it -->
                    <span class="icon__close"></span>
                </button>
            </div>

            <!-- Factsheet block: Container for detailed information about each pigeon species -->
            <div class="detail__factsheet container--flex-columns with-shadow" id="detailFactsheet">
                <div class="detail__main-info container--flex-columns" id="detailMainInfo">
                    <!-- Dynamic content generated by JS 

                    HTML will have the following structure:
                    <h3 class="detail__title">More about the ${pigeon.commonName}</h3>
                    <p class="detail__summary">${pigeon.summary}</p>
                    <a class="link detail__wiki-link" title="Go to the ${pigeon.commonName} Wikipedia Article" target="blank" rel="noopener noreferrer" href="${articleLink}">
                        Wiki article
                        Revisar: Agregar ícono en i, svg o span
                    </a>
                    -->
                </div>

                <div class="detail__map" id="detailMap">
                    <div class="detail__map-canvas" id="detailMapCanvas">
                        <picture class="detail__map-picture--base full-width">
                            <source srcset="assets/maps/base-map.svg" type="image/svg">
                            <img class="detail__map-img--base" src="assets/maps/base-map.svg" alt="outline of a world map">
                        </picture>
                        <!-- Dynamic map content generated by JS
                        
                        HTML will have the following structure:
                        <picture class="detail__map-picture">
                            <source src="assets/maps/${region}.svg" type="image/svg">
                            <img 
                                class="detail__map-img" 
                                src="assets/maps/${region}.svg" 
                                alt="${translateRegionName(region)}">
                        </picture>
                        -->
                    </div>

                    <p class="detail__metadatum text-md" id="detailMapRegions">
                        <!-- Dynamic content generated by JS -->
                    </p>
                    <p class="detail__metadatum text-md" id="detailMapLocations">
                        <!-- Dynamic content generated by JS -->
                    </p>
                </div>

                <div class="detail__related-species container--flex-columns" id="detailRelatedSpecies">
                    <!-- Dynamic related species content generated by JS 
                    HTML will have the following structure:
                    Revisar: Copiar y pegar estructura final aquí
                    -->
                </div>
            </div>

            <!-- Postcard block: Summarized information about the selected pigeon species styled as a postcard -->
            <div class="top detail__postcard-container with-shadow" id="postcardContainer">
                
                <!-- Front of the postcard -->
                <div class="active detail__postcard-front full-width container--flex-columns" id="detailPostcardFront">
                    <!-- Dynamic postcard front content generated by JS
                    
                    HTML will have the following structure:
                    <picture class="detail__postcard-picture">
                        <source src="${pigeon.photos[0]}" type="image/${extensionType}">
                        <img 
                            class="detail__postcard-img"
                            src="assets/postal-placeholder.png"
                            alt="${pigeon.genus} ${pigeon.species}"
                        >
                    </picture>
                    <div class="detail__postcard-titles">
                        <h2 class="detail__common-name">${pigeon.commonName}</h2>
                        <p class="detail__scientific-name text-sm">${pigeon.genus} ${pigeon.species}</p>
                    </div>
                    -->
                </div>
                

                <!-- Back of the postcard -->
                <div class="inactive detail__postcard-back full-width container--flex-columns" id="detailPostcardBack">
                    <!-- Dynamic back content generated by JS
                    
                    HTML will have the following structure:
                    <picture class="detail__stamp-picture">
                        <source src="${webpFile}" type="image/webp">
                        <img 
                            class="detail__stamp-img" 
                            src="${pngFile}"
                            loading="lazy"
                            title="${pigeon.genus} ${pigeon.species}"
                            alt="${pigeon.commonName} styled as a vintage postal stamp"
                        >
                    </picture>

                    <div class="detail__postcard-info">
                        <div class="detail__metadata">
                            <p class="detail__metadatum">Common Name: ${pigeon.commonName}</p>
                            <p class="detail__metadatum">Genus: ${pigeon.genus}</p>
                            <p class="detail__metadatum">Species: ${pigeon.species}</p>
                            <p class="detail__metadatum">Living Region: ${pigeonRegions}</p>
                            <p class="detail__metadatum">ConservationStatus: ${pigeon.conservationStatus}</p>
                        </div>

                        <a class="link detail__wiki-link" title="Go to the ${pigeon.commonName} Wikipedia Article" target="blank" rel="noopener noreferrer" href="${articleLink}">
                        Wiki article
                        Revisar: Agregar ícono en i, svg o span
                    </div>
                    -->
                </div>
            </div>
        </div>
    </section>
</main>

</body>

</html>
